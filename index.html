<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo de Alya | Zaien</title>
    <style>
        /* Estilos generales para que quede bonito */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* La tarjeta central (efecto cristal) */
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 {
            color: #6a11cb;
            margin-bottom: 10px;
            font-size: 2em;
        }

        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Estilo para la imagen de Alya */
        .alya-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .alya-img:hover {
            transform: scale(1.05);
        }

        /* El botón */
        .btn {
            background: linear-gradient(45deg, #6a11cb, #2575fc);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(37, 117, 252, 0.4);
        }

        /* Pie de página pequeño */
        .footer {
            margin-top: 20px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Imagen de Alya (Puedes cambiar el src por tu propia imagen) -->
        <!-- He puesto una imagen genérica de anime por ahora -->
        <img src="https://i.pinimg.com/736x/8a/d6/4d/8ad64d7769f65e3b6b6b6b6b6b6b6b6b.jpg" alt="Alya Koujo" class="alya-img" onerror="this.src='https://via.placeholder.com/150?text=Alya'">
        
        <h1>¡Hola, soy Alya!</h1>
        <p>Bienvenido al rincón oficial de Zaien. Aquí es donde la magia del anime y la tecnología se encuentran. ¿Listo para aprender ruso? 😉</p>
        
        <button class="btn" onclick="saludar()">Haz clic aquí</button>

        <div class="footer">
            Creado con ❤️ por Zaien | GitHub Pages
        </div>
    </div>

    <script>
        function saludar() {
            alert("¡Privet! 👋 Gracias por visitar mi web, discípulo de Zaien.");
        }
    </script>

</body>
</html>
